version = 1

# REUSE (https://reuse.software) spec 3.x license/copyright declarations for the
# iter-maps/mobile repository. This is the multi-license repo's auditability
# backbone: GPL-3.0 code + CC-BY-4.0 docs. Full license texts live under
# LICENSES/ named by their SPDX identifier. These [[annotations]] blocks declare
# licensing for files that do not carry an inline SPDX header.

# --- Code: strong copyleft (GPL-3.0-or-later) -------------------------------
# The Gradle wrapper scripts carry their own inline Apache-2.0 headers and the
# wrapper jar/properties are Gradle's Apache-2.0 (declared below), so neither is
# swept in here.
[[annotations]]
path = [
  "shared/**",
  "androidApp/**",
  "iosApp/**",
  "build.gradle.kts",
  "settings.gradle.kts",
  "gradle.properties",
  "gradle/libs.versions.toml",
  ".gitignore",
  ".github/**",
]
SPDX-FileCopyrightText = "Iter Maps contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

# --- Gradle wrapper: upstream Apache-2.0 ------------------------------------
[[annotations]]
path = [
  "gradle/wrapper/gradle-wrapper.jar",
  "gradle/wrapper/gradle-wrapper.properties",
]
SPDX-FileCopyrightText = "Gradle, Inc."
SPDX-License-Identifier = "Apache-2.0"

# --- Docs & governance: CC-BY-4.0 -------------------------------------------
[[annotations]]
path = [
  "docs/**",
  "README.md",
  "*.md",
]
SPDX-FileCopyrightText = "Iter Maps contributors"
SPDX-License-Identifier = "CC-BY-4.0"
