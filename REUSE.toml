# --- Code: strong copyleft (GPL-3.0-or-later) -------------------------------
[[annotations]]
path = [
  "shared/**",
  "androidApp/**",
  "iosApp/**",
  "build.gradle.kts",
  "settings.gradle.kts",
  "gradle.properties",
  "gradle/**",
  "gradlew",
  "gradlew.bat",
  ".gitignore",
  ".github/**",
]
