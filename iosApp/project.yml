# iOS app shell (ADR 0010): the Xcode project is generated, never committed.
# Run `xcodegen generate` in this directory, then open Iter.xcodeproj.
name: Iter

options:
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.0.0"

targets:
  Iter:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: MapLibre
        product: MapLibre
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Iter
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: >-
          La tua posizione centra la mappa e serve a calcolare i percorsi.
          Your position centers the map and is used to plan routes.
        # The dev gateway is plain http on localhost (ADR 0004).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.iterapp.app
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        # The Gradle build phase writes outside the sandbox.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "IterCore"
    preBuildScripts:
      - name: Build IterCore (Gradle)
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

schemes:
  Iter:
    build:
      targets:
        Iter: all
    run:
      config: Debug
    archive:
      config: Release
