      <rect x="10" y="214" width="290" height="34" rx="10" fill="#E9F5EE" stroke="#CBE7D6"/><text x="26" y="236">Live train boards</text>
      <rect x="10" y="256" width="290" height="34" rx="10" fill="#E9F5EE" stroke="#CBE7D6"/><text x="26" y="278">Bottom-sheet UX (Android)</text>
    </g>
    <g>
      <rect x="320" y="46" width="290" height="34" rx="10" fill="#EEF0FB" stroke="#D9DCF2"/><text x="336" y="68">iOS shell (Liquid Glass)</text>
      <rect x="320" y="88" width="290" height="34" rx="10" fill="#EEF0FB" stroke="#D9DCF2"/><text x="336" y="110">Offline map management</text>
      <rect x="320" y="130" width="290" height="34" rx="10" fill="#EEF0FB" stroke="#D9DCF2"/><text x="336" y="152">Reliability in results</text>
