<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img" aria-label="Iter Maps mobile roadmap" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <g font-size="15" font-weight="700">
