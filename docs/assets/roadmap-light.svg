  </g>
  <g font-size="13.5" fill="#1B1D29">
    <g>
      <rect x="10" y="46" width="290" height="34" rx="10" fill="#E9F5EE" stroke="#CBE7D6"/><text x="26" y="68">Shared gateway core (KMP)</text>
      <rect x="10" y="88" width="290" height="34" rx="10" fill="#E9F5EE" stroke="#CBE7D6"/><text x="26" y="110">Map, transit styles &amp; overlays</text>
